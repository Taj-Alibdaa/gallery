<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>معرض الأعمال</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
/* ══ VARIABLES & RESET ══ */
:root{
  --red:#981B1E;
  --red-dark:#6B1214;
  --red-pale:rgba(152,27,30,0.07);
  --black:#111;
  --white:#ffffff00;
  --gray-dark:#333;
  --gray-mid:#666;
  --gray-border:rgba(0,0,0,0.1);
  --font:'Baloo Bhaijaan 2',sans-serif;
  --transition:all .3s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

html, body {
  scrollbar-width: none; /* Firefox */
  -ms-overflow-style: none; /* IE / Edge */
}

html::-webkit-scrollbar,
body::-webkit-scrollbar {
  display: none; /* Chrome / Safari */
}

/* ══ TRANSPARENT BACKGROUND ══ */
html,body{
  font-family:var(--font);
  color:var(--black);
  background:transparent !important;
  overflow-x:hidden;
}

/* ══ ANIMATIONS ══ */
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(28px) scale(.97)}
  to  {opacity:1;transform:translateY(0)    scale(1)}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{
  0%  {background-position:-200% 0}
  100%{background-position: 200% 0}
}
@keyframes chipIn{
  from{opacity:0;transform:translateY(-8px)}
  to  {opacity:1;transform:translateY(0)}
}

/* ══ GALLERY WRAPPER ══ */
.gallery-wrapper{
  max-width:1400px;
  margin:0 auto;
  padding:1.6rem 1.5rem;
  background:transparent;
}

/* ══ FILTER BAR ══ */
.filter-bar{
  display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;
  margin-bottom:1.6rem;padding-bottom:1.2rem;
  border-bottom:1px solid var(--gray-border);
}
.filter-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 18px;border-radius:50px;border:1.5px solid var(--gray-border);
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  font-family:var(--font);font-size:.84rem;font-weight:600;
  cursor:pointer;transition:var(--transition);color:var(--gray-dark);
  white-space:nowrap;
  animation:chipIn .35s ease both;
}
.filter-chip:hover{
  border-color:var(--red);color:var(--red);
  background:var(--red-pale);
  transform:translateY(-2px);
  box-shadow:0 4px 14px rgba(152,27,30,.15);
}
.filter-chip.active{
  background:var(--red);border-color:var(--red);color:white;
  box-shadow:0 4px 16px rgba(152,27,30,.4);
  transform:translateY(-1px);
}
.chip-count{
  background:rgba(0,0,0,.1);border-radius:10px;padding:1px 7px;font-size:.75rem;
}
.filter-chip.active .chip-count{background:rgba(255,255,255,.25)}

/* ══ META ROW ══ */
.gallery-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.2rem;color:var(--gray-mid);font-size:.85rem;
}
.gallery-meta strong{color:var(--black)}

/* ══ PHOTO GRID (masonry) ══ */
.photo-grid{
  columns:2;
  column-gap:30px;
}
@media(max-width:600px){.photo-grid{columns:1}}

/* ══ PHOTO CARD ══ */
.photo-item{
  position:relative;overflow:hidden;border-radius:20px;
  background:rgba(240,240,240,0.6);cursor:pointer;
  break-inside:avoid;margin-bottom:20px;
  display:inline-block;width:100%;

  /* entrance animation — staggered via inline style */
  opacity:0;
  animation:fadeInUp .55s cubic-bezier(.22,.61,.36,1) both;
}
.photo-item img{
  width:100%;height:auto;display:block;
  transition:transform .45s cubic-bezier(.4,0,.2,1);
}
.photo-item:hover img{transform:scale(1.06)}

/* overlay */
.photo-item-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.65) 0%,transparent 55%);
  opacity:0;transition:opacity .3s ease;
  display:flex;align-items:flex-end;padding:10px;
}
.photo-item:hover .photo-item-overlay{opacity:1}
.photo-item-label{
  color:white;font-size:.75rem;font-weight:700;
  background:rgba(152,27,30,.85);padding:3px 10px;border-radius:12px;
}

/* ══ SKELETON ══ */
.photo-skeleton{
  break-inside:avoid;margin-bottom:10px;display:inline-block;width:100%;
  height:220px;border-radius:8px;
  background:linear-gradient(90deg,rgba(230,230,230,.7) 25%,rgba(210,210,210,.7) 50%,rgba(230,230,230,.7) 75%);
  background-size:200% 100%;animation:shimmer 1.3s infinite;
}

/* ══ EMPTY STATE ══ */
.gallery-empty{
  text-align:center;padding:5rem 2rem;color:var(--gray-mid);
}
.gallery-empty .empty-icon{font-size:3.5rem;margin-bottom:1rem}
.gallery-empty p{font-size:1.05rem;font-weight:600}

/* ══ LIGHTBOX ══ */
#lightbox{
  position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.94);
  display:none;align-items:center;justify-content:center;
}
#lightbox.open{
  display:flex;
  animation:fadeIn .22s ease;
}
.lb-inner{
  position:relative;display:flex;flex-direction:column;align-items:center;
  max-width:92vw;max-height:90vh;
}
.lb-img{
  max-width:88vw;max-height:78vh;object-fit:contain;
  border-radius:10px;box-shadow:0 24px 80px rgba(0,0,0,.7);
  animation:scaleIn .28s cubic-bezier(.22,.61,.36,1);
}
.lb-info{color:white;text-align:center;margin-top:.9rem}
.lb-cat{
  display:inline-block;background:var(--red);
  padding:3px 14px;border-radius:12px;font-size:.78rem;font-weight:700;margin-bottom:.4rem;
}
.lb-desc{font-size:.88rem;color:rgba(255,255,255,.7)}
.lb-counter{font-size:.78rem;color:rgba(255,255,255,.45);margin-top:.3rem}

.lb-close{
  position:fixed;top:1.4rem;left:1.4rem;
  background:rgba(255,255,255,.12);backdrop-filter:blur(4px);
  border:none;border-radius:50%;width:44px;height:44px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;color:white;transition:var(--transition);
}
.lb-close:hover{background:var(--red);transform:scale(1.1)}

.lb-prev,.lb-next{
  position:fixed;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,.12);backdrop-filter:blur(4px);
  border:none;border-radius:50%;width:50px;height:50px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;color:white;transition:var(--transition);
}
.lb-prev:hover,.lb-next:hover{background:var(--red);transform:translateY(-50%) scale(1.08)}
.lb-prev:disabled,.lb-next:disabled{opacity:.25;pointer-events:none}
.lb-prev{right:1.5rem}
.lb-next{left:1.5rem}
</style>
</head>
<body>

<!-- GALLERY -->
<div class="gallery-wrapper">

  <!-- FILTER BAR -->
  <div class="filter-bar" id="filterBar">
    <button class="filter-chip active" data-cat="all" onclick="filterGallery('all',this)">
      🖼️ الكل <span class="chip-count" id="count-all">0</span>
    </button>
  </div>

  <!-- META -->
  <div class="gallery-meta">
    <span id="galleryMeta">جاري التحميل…</span>
  </div>

  <!-- GRID -->
  <div class="photo-grid" id="photoGrid">
    <div class="photo-skeleton" style="height:260px"></div>
    <div class="photo-skeleton" style="height:200px"></div>
    <div class="photo-skeleton" style="height:300px"></div>
    <div class="photo-skeleton" style="height:220px"></div>
    <div class="photo-skeleton" style="height:240px"></div>
    <div class="photo-skeleton" style="height:280px"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <button class="lb-prev" id="lbPrev" onclick="lbNav(-1)">‹</button>
  <button class="lb-next" id="lbNext" onclick="lbNav(1)">›</button>
  <div class="lb-inner">
    <img class="lb-img" id="lbImg" src="" alt="">
    <div class="lb-info">
      <div class="lb-cat"  id="lbCat"></div>
      <div class="lb-desc" id="lbDesc"></div>
      <div class="lb-counter" id="lbCounter"></div>
    </div>
  </div>
</div>

<script>
/* ══ FIREBASE ══ */
firebase.initializeApp({
  apiKey:            "AIzaSyAaqn0emE1XRE1r95jzz6zOyHJpYhG6PDE",
  authDomain:        "taj-alibdaa.firebaseapp.com",
  projectId:         "taj-alibdaa",
  storageBucket:     "taj-alibdaa.firebasestorage.app",
  messagingSenderId: "822530121102",
  appId:             "1:822530121102:web:4f105f37c9b7a31e9298df",
});
const db = firebase.firestore();

/* ══ STATE ══ */
let allPhotos = [], filtered = [], activeCat = 'all', lbIndex = 0, catCounts = {};

/* ══ UTIL ══ */
function toDirect(url) {
  if (!url) return '';
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return `https://drive.google.com/uc?export=view&id=${m[1]}`;
  return url;
}

/* ══ LOAD ══ */
async function loadGallery() {
  try {
    const snap = await db.collection('projects').get();
    allPhotos = [];
    catCounts = { all: 0 };

    snap.forEach(doc => {
      const p = { id: doc.id, ...doc.data() };
      const cat = p.category || 'أخرى';
      const name = p.name || p.title || '';

      const imgs = [];
      if (p.coverUrl) imgs.push(p.coverUrl);
      if (p.imageUrl && !imgs.includes(p.imageUrl)) imgs.push(p.imageUrl);
      if (Array.isArray(p.images)) p.images.forEach(u => { if (u && !imgs.includes(u)) imgs.push(u); });

      imgs.forEach(raw => {
        const url = toDirect(raw);
        if (!url) return;
        allPhotos.push({ url, cat, desc: p.description || name });
        catCounts[cat] = (catCounts[cat] || 0) + 1;
        catCounts.all++;
      });
    });

    buildChips();
    filterGallery('all', document.querySelector('[data-cat="all"]'));

  } catch(err) {
    console.error(err);
    document.getElementById('photoGrid').innerHTML =
      `<div class="gallery-empty"><div class="empty-icon">⚠️</div><p>تعذّر تحميل الصور</p></div>`;
  }
}

/* ══ CHIPS ══ */
function buildChips() {
  const bar = document.getElementById('filterBar');
  bar.querySelector('[data-cat="all"] .chip-count').textContent = catCounts.all || 0;
  bar.querySelectorAll('[data-cat]:not([data-cat="all"])').forEach(c => c.remove());

  const icons = { 'صالة':'🛋️','مجلس':'🪑','مطبخ':'🍳','غرفة نوم':'🛏️','حمام':'🚿','مكتب':'💼','خارجي':'🌿','واجهة':'🏛️','حديقة':'🌳' };
  const cats = Object.keys(catCounts).filter(c => c !== 'all').sort((a,b) => catCounts[b]-catCounts[a]);

  cats.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip';
    btn.dataset.cat = cat;
    btn.style.animationDelay = `${(i + 1) * 0.06}s`;
    btn.innerHTML = `${icons[cat] || '📐'} ${cat} <span class="chip-count">${catCounts[cat]}</span>`;
    btn.onclick = () => filterGallery(cat, btn);
    bar.appendChild(btn);
  });
}

/* ══ FILTER ══ */
function filterGallery(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  if (btn) btn.classList.add('active');
  filtered = cat === 'all' ? [...allPhotos] : allPhotos.filter(p => p.cat === cat);
  renderGrid();
  document.getElementById('galleryMeta').innerHTML =
    cat === 'all'
      ? `إجمالي الصور: <strong>${filtered.length}</strong>`
      : `تصنيف: <strong>${cat}</strong> — <strong>${filtered.length}</strong> صورة`;
}

/* ══ RENDER ══ */
function renderGrid() {
  const grid = document.getElementById('photoGrid');

  if (!filtered.length) {
    grid.innerHTML = `<div class="gallery-empty"><div class="empty-icon">🖼️</div><p>لا توجد صور في هذا التصنيف</p></div>`;
    return;
  }

  /* build HTML — stagger delay per card */
  grid.innerHTML = filtered.map((photo, i) => `
    <div class="photo-item" style="animation-delay:${i * 0.06}s" onclick="openLightbox(${i})">
      <img
        src="${photo.url}"
        alt="${photo.cat}"
        loading="lazy"
        onerror="this.closest('.photo-item').style.display='none'"
      >
      <div class="photo-item-overlay">
        <span class="photo-item-label">${photo.cat}</span>
      </div>
    </div>
  `).join('');
}

/* ══ LIGHTBOX ══ */
function openLightbox(i) {
  lbIndex = i; showSlide();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function showSlide() {
  const p = filtered[lbIndex];
  if (!p) return;
  document.getElementById('lbImg').src      = p.url;
  document.getElementById('lbImg').alt      = p.cat;
  document.getElementById('lbCat').textContent  = p.cat;
  document.getElementById('lbDesc').textContent = p.desc || '';
  document.getElementById('lbCounter').textContent = `${lbIndex + 1} / ${filtered.length}`;
  document.getElementById('lbPrev').disabled = lbIndex >= filtered.length - 1;
  document.getElementById('lbNext').disabled = lbIndex <= 0;
}
function lbNav(dir) {
  lbIndex = Math.min(Math.max(lbIndex + dir, 0), filtered.length - 1);
  showSlide();
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape')        closeLightbox();
  else if (e.key === 'ArrowLeft')  lbNav(-1);
  else if (e.key === 'ArrowRight') lbNav(+1);
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});

/* ══ INIT ══ */
loadGallery();
</script>
</body>
</html>
