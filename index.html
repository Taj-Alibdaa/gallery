<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects</title>

  <!-- ── Baloo Bhaijaan 2 ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- ── Firebase SDKs ── -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    /* ─────────────────────────────────────────
       Variables
    ───────────────────────────────────────── */
    :root {
      --bg:      #ffffff;
      --text:    #0a0a0a;
      --muted:   #aaa;
      --accent:  #981B1E;
      --border:  #ebebeb;
      --gap:     12px;
      --radius:  6px;
      --font:    'Baloo Bhaijaan 2', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    /* ─────────────────────────────────────────
       Status bar (connection feedback)
    ───────────────────────────────────────── */
    #statusBar {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      padding: 10px 22px;
      border-radius: 100px;
      font-size: 0.78rem;
      font-family: var(--font);
      letter-spacing: 0.06em;
      white-space: nowrap;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    #statusBar.ok  { background: #0a0a0a; color: #fff; display: block; }
    #statusBar.err { background: var(--accent); color: #fff; display: block; }

    /* ─────────────────────────────────────────
       Filters strip
    ───────────────────────────────────────── */
    .filters-wrap {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 16px clamp(20px, 5vw, 60px);
    }

    .filters {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
    }

    .count-badge {
      margin-right: auto;          /* pushes filters to left in RTL */
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      font-weight: 400;
      min-width: 48px;
    }

    .filter-divider {
      width: 1px;
      height: 14px;
      background: var(--border);
      margin: 0 4px;
    }

    .filter-btn {
      font-family: var(--font);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--muted);
      background: transparent;
      border: none;
      border-bottom: 1.5px solid transparent;
      padding: 4px 4px;
      margin: 0 8px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .filter-btn:hover { color: var(--text); }

    .filter-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }

    /* ─────────────────────────────────────────
       Masonry grid
    ───────────────────────────────────────── */
    .grid-wrap {
      padding: 24px clamp(20px, 5vw, 60px) 60px;
    }

    .masonry {
      columns: 4 220px;
      column-gap: var(--gap);
    }

    /* ─────────────────────────────────────────
       Card
    ───────────────────────────────────────── */
    .card {
      break-inside: avoid;
      margin-bottom: var(--gap);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      cursor: pointer;
      animation: fadeUp 0.45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .card:hover img { transform: scale(1.04); }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.93);
      opacity: 0;
      transition: opacity 0.28s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .card:hover .card-overlay { opacity: 1; }

    .card-line {
      width: 24px;
      height: 1.5px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .card:hover .card-line { transform: scaleX(1); }

    .card-title {
      font-family: var(--font);
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
      transform: translateY(5px);
      transition: transform 0.28s ease 0.04s;
      text-align: center;
      padding: 0 12px;
    }

    .card:hover .card-title { transform: translateY(0); }

    .card-cat {
      font-family: var(--font);
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.12em;
      transform: translateY(5px);
      transition: transform 0.28s ease 0.07s;
    }

    .card:hover .card-cat { transform: translateY(0); }

    /* ─────────────────────────────────────────
       Loading / Empty
    ───────────────────────────────────────── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 100px 0;
      gap: 16px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 1.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: var(--font);
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .empty-state {
      display: none;
      text-align: center;
      padding: 80px 0;
    }

    .empty-text {
      font-family: var(--font);
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    /* ─────────────────────────────────────────
       Lightbox
    ───────────────────────────────────────── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(255, 255, 255, 0.97);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }

    .lightbox-img {
      max-width: 88vw;
      max-height: 88vh;
      display: block;
      border-radius: var(--radius);
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.08);
    }

    .lightbox-meta {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      white-space: nowrap;
    }

    .lb-meta-title {
      font-family: var(--font);
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
    }

    .lb-meta-cat {
      font-family: var(--font);
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.12em;
      margin-top: 4px;
    }

    .lb-close, .lb-nav {
      position: fixed;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .lb-close:hover, .lb-nav:hover { border-color: var(--accent); }

    .lb-close {
      top: 22px;
      left: 26px;
      width: 40px;
      height: 40px;
    }

    .lb-close svg {
      width: 15px;
      height: 15px;
      stroke: var(--text);
      fill: none;
      stroke-width: 1.5;
    }

    .lb-nav {
      top: 50%;
      transform: translateY(-50%);
      width: 42px;
      height: 42px;
    }

    .lb-nav svg { width: 17px; height: 17px; stroke: var(--text); fill: none; stroke-width: 1.5; }
    .lb-prev { right: 22px; }
    .lb-next { left: 22px; }

    /* ─────────────────────────────────────────
       Responsive
    ───────────────────────────────────────── */
    @media (max-width: 768px) {
      .masonry { columns: 2 150px; }
      .count-badge { display: none; }
    }

    @media (max-width: 420px) {
      .masonry { columns: 1; }
    }
  </style>
</head>
<body>

  <!-- ── Filters ─────────────────────────────────── -->
  <div class="filters-wrap">
    <div class="filters" id="filtersContainer">
      <span class="count-badge" id="countBadge">— / —</span>
      <button class="filter-btn active" data-cat="all">الكل</button>
    </div>
  </div>

  <!-- ── Grid ────────────────────────────────────── -->
  <div class="grid-wrap">
    <div class="masonry" id="masonryGrid">
      <div class="loading-state" id="loadingState" style="column-span:all">
        <div class="spinner"></div>
        <p class="loading-text">جارٍ التحميل…</p>
      </div>
      <div class="empty-state" id="emptyState" style="column-span:all">
        <p class="empty-text">لا توجد أعمال في هذا التصنيف</p>
      </div>
    </div>
  </div>

  <!-- ── Lightbox ─────────────────────────────────── -->
  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lbClose">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button class="lb-nav lb-prev" id="lbPrev">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="lb-nav lb-next" id="lbNext">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <img class="lightbox-img" id="lbImg" src="" alt="" />
    <div class="lightbox-meta">
      <div class="lb-meta-title" id="lbTitle"></div>
      <div class="lb-meta-cat" id="lbCat"></div>
    </div>
  </div>

  <!-- ── Connection status toast ───────────────────── -->
  <div id="statusBar"></div>

  <script>
    /* ════════════════════════════════════════════════
       1. Firebase — initialise & connect
    ════════════════════════════════════════════════ */
    const firebaseConfig = {
      apiKey:            "AIzaSyAaqn0emE1XRE1r95jzz6zOyHJpYhG6PDE",
      authDomain:        "taj-alibdaa.firebaseapp.com",
      projectId:         "taj-alibdaa",
      storageBucket:     "taj-alibdaa.firebasestorage.app",
      messagingSenderId: "822530121102",
      appId:             "1:822530121102:web:4f105f37c9b7a31e9298df",
      measurementId:     "G-59X0VPPWXE"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    /* ════════════════════════════════════════════════
       2. Cloudinary — URL builder
       Cloud name : taj-alibdaa
       ID         : 2aae9fb3649b8b14e41b12bb8e8cc3
    ════════════════════════════════════════════════ */
    const CLOUDINARY_CLOUD = "taj-alibdaa";

    /**
     * Build an optimised Cloudinary delivery URL.
     * Accepts either:
     *   - A raw public_id  → "folder/my-image"
     *   - A full URL       → "https://res.cloudinary.com/…"  (returned as-is)
     */
    function cdnUrl(publicId, width = 700) {
      if (!publicId) return '';
      if (publicId.startsWith('http')) return publicId;
      return `https://res.cloudinary.com/${CLOUDINARY_CLOUD}/image/upload/f_auto,q_auto,w_${width}/${publicId}`;
    }

    /* ════════════════════════════════════════════════
       3. Status toast helper
    ════════════════════════════════════════════════ */
    function toast(msg, type = 'ok', duration = 2800) {
      const bar = document.getElementById('statusBar');
      bar.textContent = msg;
      bar.className = type;
      clearTimeout(bar._timer);
      bar._timer = setTimeout(() => {
        bar.style.opacity = '0';
        setTimeout(() => { bar.className = ''; bar.style.opacity = '1'; }, 400);
      }, duration);
    }

    /* ════════════════════════════════════════════════
       4. State
    ════════════════════════════════════════════════ */
    let all      = [];
    let filtered = [];
    let lbIndex  = 0;

    /* ════════════════════════════════════════════════
       5. DOM refs
    ════════════════════════════════════════════════ */
    const grid      = document.getElementById('masonryGrid');
    const loadingEl = document.getElementById('loadingState');
    const emptyEl   = document.getElementById('emptyState');
    const filtersEl = document.getElementById('filtersContainer');
    const countEl   = document.getElementById('countBadge');
    const lightbox  = document.getElementById('lightbox');
    const lbImg     = document.getElementById('lbImg');
    const lbTitle   = document.getElementById('lbTitle');
    const lbCat     = document.getElementById('lbCat');

    /* ════════════════════════════════════════════════
       6. Load projects from Firestore
       Collection : "projects"
       Fields     : imageUrl | image | title | category | order
    ════════════════════════════════════════════════ */
    async function load() {
      try {
        let snap;
        try {
          snap = await db.collection('projects').orderBy('order', 'asc').get();
        } catch {
          // collection might not have an "order" field — fallback
          snap = await db.collection('projects').get();
        }

        all      = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        filtered = [...all];

        toast(`✓ تم الاتصال بـ Firebase — ${all.length} مشروع`, 'ok');
        buildFilters();
        render(filtered);
        updateCount();

      } catch (err) {
        console.error('Firebase error:', err);
        loadingEl.style.display = 'none';
        toast('تعذّر الاتصال بـ Firebase — تحقق من الإعدادات', 'err', 5000);
        emptyEl.style.display   = 'block';
        emptyEl.querySelector('.empty-text').textContent =
          'تعذّر تحميل الأعمال — تأكد من إعدادات Firebase';
      }
    }

    /* ════════════════════════════════════════════════
       7. Build filter buttons from Firestore categories
    ════════════════════════════════════════════════ */
    function buildFilters() {
      const cats = [...new Set(all.map(p => p.category).filter(Boolean))];

      cats.forEach(cat => {
        const div = document.createElement('span');
        div.className = 'filter-divider';
        filtersEl.appendChild(div);

        const btn = document.createElement('button');
        btn.className   = 'filter-btn';
        btn.dataset.cat = cat;
        btn.textContent = cat;
        btn.addEventListener('click', () => setFilter(cat, btn));
        filtersEl.appendChild(btn);
      });

      // wire "الكل" button
      filtersEl.querySelector('[data-cat="all"]')
               .addEventListener('click', function () { setFilter('all', this); });
    }

    /* ════════════════════════════════════════════════
       8. Filter logic
    ════════════════════════════════════════════════ */
    function setFilter(cat, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filtered = cat === 'all' ? [...all] : all.filter(p => p.category === cat);
      render(filtered);
      updateCount();
    }

    /* ════════════════════════════════════════════════
       9. Render cards — images served via Cloudinary
    ════════════════════════════════════════════════ */
    function render(projects) {
      grid.querySelectorAll('.card').forEach(c => c.remove());
      loadingEl.style.display = 'none';

      if (!projects.length) {
        emptyEl.style.display = 'block';
        return;
      }
      emptyEl.style.display = 'none';

      projects.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.animationDelay = `${i * 0.055}s`;

        // imageUrl : can be a Cloudinary public_id or a full URL
        const src = cdnUrl(p.imageUrl || p.image || '', 700);

        card.innerHTML = `
          <img
            src="${src}"
            alt="${p.title || ''}"
            loading="lazy"
            onerror="this.src='https://placehold.co/600x800/f5f5f5/ccc?text=—'"
          />
          <div class="card-overlay">
            <div class="card-line"></div>
            <div class="card-title">${p.title || ''}</div>
            <div class="card-cat">${p.category || ''}</div>
          </div>`;

        card.addEventListener('click', () => openLb(i));
        grid.appendChild(card);
      });
    }

    function updateCount() {
      countEl.textContent = `${filtered.length} / ${all.length}`;
    }

    /* ════════════════════════════════════════════════
       10. Lightbox
    ════════════════════════════════════════════════ */
    function openLb(i) {
      lbIndex = i;
      showLb();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function showLb() {
      const p = filtered[lbIndex];
      if (!p) return;
      // Use higher resolution in lightbox via Cloudinary
      lbImg.src = cdnUrl(p.imageUrl || p.image || '', 1400);
      lbImg.alt = p.title || '';
      lbTitle.textContent = p.title    || '';
      lbCat.textContent   = p.category || '';
    }

    function closeLb() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('lbClose').addEventListener('click', closeLb);

    document.getElementById('lbPrev').addEventListener('click', () => {
      lbIndex = (lbIndex + 1) % filtered.length;
      showLb();
    });

    document.getElementById('lbNext').addEventListener('click', () => {
      lbIndex = (lbIndex - 1 + filtered.length) % filtered.length;
      showLb();
    });

    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLb(); });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')     closeLb();
      if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % filtered.length; showLb(); }
      if (e.key === 'ArrowLeft')  { lbIndex = (lbIndex - 1 + filtered.length) % filtered.length; showLb(); }
    });

    /* ════════════════════════════════════════════════
       11. Boot
    ════════════════════════════════════════════════ */
    load();
  </script>
</body>
</html>
